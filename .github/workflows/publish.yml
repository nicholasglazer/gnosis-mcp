name: Publish to PyPI & MCP Registry

on:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
    tags:
      - "v*"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Found version: v$VERSION"

      - name: Decide whether to release
        id: decide
        run: |
          # If triggered by a tag push, always release — but first assert tag matches pyproject
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            REF_TAG="${GITHUB_REF##refs/tags/}"
            if [[ "$REF_TAG" != "${{ steps.version.outputs.tag }}" ]]; then
              echo "ERROR: tag $REF_TAG does not match pyproject.toml version ${{ steps.version.outputs.tag }}" >&2
              exit 1
            fi
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag push trigger — releasing"
            exit 0
          fi
          # If triggered by pyproject.toml change, check if tag exists
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "New version ${{ steps.version.outputs.tag }}, will release"
          fi

      - name: Verify version parity across all 4 files
        if: steps.decide.outputs.should_release == 'true'
        run: bash scripts/check-versions.sh

  test:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gnosis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Enable pgvector
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -d gnosis_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run tests (SQLite + unit)
        run: uv run pytest -q -m "not postgres_only and not eval and not bench and not e2e"
      - name: Run tests (PostgreSQL)
        # Tolerated to fail while backend parity lands; publish depends on SQLite tests.
        continue-on-error: true
        env:
          GNOSIS_MCP_CI_PG: "1"
          GNOSIS_MCP_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gnosis_test
        run: |
          uv run gnosis-mcp init-db
          uv run gnosis-mcp check
          uv run pytest -q -m "not sqlite_only and not eval and not bench and not e2e"

  build:
    needs: [check, test]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-mcp-registry:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          URL="https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz"
          curl -fsSL --retry 3 --retry-delay 5 "$URL" -o /tmp/mcp-publisher.tar.gz
          tar -xzf /tmp/mcp-publisher.tar.gz
          test -s mcp-publisher || { echo "mcp-publisher binary missing or empty" >&2; exit 1; }
          chmod +x mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
      - name: Login via GitHub OIDC
        run: mcp-publisher login github-oidc || { echo "mcp-publisher login failed" >&2; exit 1; }
      - name: Publish to MCP Registry
        run: mcp-publisher publish || { echo "MCP Registry publish failed" >&2; exit 1; }

  tag:
    needs: [check, publish-pypi]
    if: github.ref != 'refs/tags/*'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ needs.check.outputs.version }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
          else
            echo "Tag $TAG already exists, skipping"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    needs: [check, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check.outputs.version }}"
          # Only create if release doesn't already exist
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --latest
            echo "Created release $TAG"
          else
            echo "Release $TAG already exists, skipping"
          fi

  # ------------------------------------------------------------------------
  # Post-release verification: poll PyPI until the new sdist is visible, then
  # compute the Arch PKGBUILD sha256 and open a PR with the change. Keeps AUR
  # packaging aligned without a manual Phase B on the maintainer's box.
  # ------------------------------------------------------------------------
  pypi-resolve-and-arch-pr:
    needs: [check, publish-pypi]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for PyPI to show the new version
        run: |
          set -euo pipefail
          VERSION="${{ needs.check.outputs.version }}"
          VERSION="${VERSION#v}"
          URL="https://files.pythonhosted.org/packages/source/g/gnosis-mcp/gnosis_mcp-${VERSION}.tar.gz"
          echo "Polling $URL"
          # 12 tries × 30 s = up to 6 minutes
          for i in $(seq 1 12); do
            if curl -fsI "$URL" >/dev/null 2>&1; then
              echo "PyPI has gnosis_mcp-${VERSION} (attempt $i)"
              exit 0
            fi
            echo "  attempt $i — not yet, sleep 30s"
            sleep 30
          done
          echo "ERROR: PyPI didn't show gnosis_mcp-${VERSION} within 6 min" >&2
          exit 1

      - name: Update Arch PKGBUILD sha256
        run: |
          set -euo pipefail
          VERSION="${{ needs.check.outputs.version }}"
          VERSION="${VERSION#v}"
          bash scripts/update-arch-sums.sh "$VERSION"

      - name: Open PR with PKGBUILD sha256 change
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.check.outputs.version }}"
          VERSION="${VERSION#v}"
          BRANCH="release/arch-sums-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- pkg/arch/; then
            echo "No PKGBUILD changes needed — skipping PR"
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add pkg/arch/PKGBUILD pkg/arch/.SRCINFO
          git commit -m "pkg(arch): sha256 for ${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "pkg(arch): sha256 for ${VERSION}" \
            --body "Auto-generated from publish.yml after PyPI upload of ${VERSION}.

\`scripts/update-arch-sums.sh\` downloaded the sdist from PyPI and computed the sha256. Review + merge, then submit PKGBUILD/.SRCINFO to AUR (see docs/releasing.md §8)." \
            --base main \
            --head "$BRANCH"
