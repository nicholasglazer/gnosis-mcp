name: docker

# Build and publish multi-arch container images to GitHub Container Registry.
#
# Triggered on:
#   - Every push to main  → tags :main, :<sha>
#   - Every version tag   → tags :<version>, :latest
#   - Weekly schedule     → rebuild :latest against current Debian base (security)
#   - Manual dispatch     → :manual-<sha>

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  schedule:
    - cron: '27 5 * * 1'  # Mondays 05:27 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=gnosis-mcp
            org.opencontainers.image.description=Self-hosted MCP server for searchable documentation.
            org.opencontainers.image.vendor=Nicholas Glazer
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://gnosismcp.com/doc/docs/overview

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Image digest
        run: echo "Published ${{ steps.meta.outputs.tags }}"
